#Added the backend CI workflow to the project. This workflow will run on every push to the main and develop branches, as well as on pull requests. It will check out the repository, set up Python, install dependencies, validate syntax, build a Docker image, run a container, and verify that the container is running correctly. Finally, it will clean up by stopping and removing the container.
name: Backend CI

on:
  push:
    branches:
      - main
      - develop

  pull_request:

jobs:
  backend-ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install backend dependencies
        working-directory: ./backend
        run: pip install -r requirements.txt

      - name: Validate backend syntax
        working-directory: ./backend
        run: python -m py_compile app.py

      - name: Build Docker image
        run: docker build -t habit-tracker-be ./backend

      - name: Run backend container
        run: |
          docker run -d --name backend-test -p 5000:5000 habit-tracker-be

      - name: Wait for startup
        run: sleep 10

      - name: Check logs
        run: docker logs backend-test

      - name: Verify running container
        run: docker ps | grep backend-test

      - name: Cleanup
        run: |
          docker stop backend-test || true
          docker rm backend-test || true